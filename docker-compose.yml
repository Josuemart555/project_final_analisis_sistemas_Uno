services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: hospital_his_app
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer-cache
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: hospital_his
      DB_USERNAME: hospital_user
      DB_PASSWORD: hospital_password
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      mysql:
        condition: service_healthy

  node:
    image: node:22-alpine
    container_name: hospital_his_node
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - npm-cache:/root/.npm
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: hospital_his_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: hospital_his
      MYSQL_USER: hospital_user
      MYSQL_PASSWORD: hospital_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  composer-cache:
  npm-cache:
  mysql-data:
